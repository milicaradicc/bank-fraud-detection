<!-- src/app/login/login.component.html -->
<div class="login-shell">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon">F</div>
      <div>
        <div class="logo-title">FraudGuard</div>
        <div class="logo-subtitle">Drools Engine v2.4</div>
      </div>
    </div>

    <h2>Prijava</h2>

    <div class="form-group">
      <label>Korisničko ime</label>
      <input
        type="text"
        [(ngModel)]="username"
        placeholder="username"
        (keyup.enter)="onSubmit()"
      />
    </div>

    <div class="form-group">
      <label>Lozinka</label>
      <input
        type="password"
        [(ngModel)]="password"
        placeholder="••••••••"
        (keyup.enter)="onSubmit()"
      />
    </div>

    <div class="login-error" *ngIf="error">⚠ {{ error }}</div>

    <button class="btn btn-primary btn-full" (click)="onSubmit()" [disabled]="loading">
      <span *ngIf="!loading">Prijavi se</span>
      <span *ngIf="loading">● Prijavljujem...</span>
    </button>
  </div>
</div>
